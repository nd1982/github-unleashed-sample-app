on:
  workflow_dispatch:
    inputs:
        version:
          description: "Version name"
          required: true
          default: "minor"
          type: choice
          options:
            - major
            - minor
            - patch
  pull_request:
  push:
    branches:
      - main

name: Release Please

jobs:
  release-please:
    runs-on: ubuntu-latest
    name: Release Please
    if: github.event_name != 'pull_request'
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
